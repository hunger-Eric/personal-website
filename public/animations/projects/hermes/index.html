<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Notebook Film Loop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10110e;
        --panel: #171813;
        --paper: #f3eadb;
        --paper-strong: #fff8eb;
        --ink: #1f2420;
        --muted: #d8cbb6;
        --muted-dark: #6f624f;
        --line: rgba(243, 234, 219, 0.16);
        --line-dark: rgba(31, 36, 32, 0.14);
        --accent: #c58a2c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family: sans-serif;
      }

      #hermes-film-loop {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(197, 138, 44, 0.22), transparent 32%),
          linear-gradient(145deg, rgba(255, 248, 235, 0.08), transparent 44%),
          #10110e;
        color: var(--paper);
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 42px 42px;
        opacity: 0.45;
      }

      .topline {
        position: absolute;
        z-index: 3;
        top: 28px;
        left: 42px;
        right: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 12px;
        color: var(--muted);
        font-family: monospace;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .scene {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 230px minmax(0, 1fr) 300px;
        gap: 18px;
        width: 100%;
        height: 100%;
        padding: 72px 42px 36px;
      }

      .panel,
      .artifact {
        border: 1px solid var(--line);
        background: rgba(23, 24, 19, 0.84);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }

      .label {
        margin: 0;
        color: var(--muted);
        font-family: monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .sources {
        align-self: center;
        padding: 16px;
      }

      .doc {
        margin-top: 12px;
        border: 1px solid var(--line-dark);
        background: var(--paper);
        color: var(--ink);
        padding: 12px;
      }

      .doc strong {
        display: block;
        font-size: 16px;
        line-height: 1.2;
      }

      .doc small {
        display: block;
        margin-top: 6px;
        color: var(--muted-dark);
        font-size: 12px;
      }

      .doc .bar {
        display: block;
        height: 6px;
        margin-top: 10px;
        border-radius: 99px;
        background: rgba(31, 36, 32, 0.18);
      }

      .pipeline {
        position: relative;
        align-self: center;
        min-height: 356px;
        border: 1px solid var(--line);
        background: rgba(23, 24, 19, 0.66);
        overflow: hidden;
      }

      .pipeline-title {
        position: absolute;
        top: 18px;
        left: 18px;
        right: 18px;
      }

      .rail {
        position: absolute;
        left: 50%;
        top: 88px;
        bottom: 48px;
        width: 2px;
        background: rgba(243, 234, 219, 0.18);
      }

      .scan {
        position: absolute;
        left: calc(50% - 3px);
        top: 88px;
        width: 6px;
        height: 76px;
        border-radius: 99px;
        background: linear-gradient(180deg, transparent, var(--accent), transparent);
        filter: drop-shadow(0 0 14px rgba(197, 138, 44, 0.72));
      }

      .node {
        position: absolute;
        left: 50%;
        display: grid;
        width: 132px;
        min-height: 62px;
        transform: translateX(-50%);
        place-items: center;
        border: 1px solid rgba(243, 234, 219, 0.22);
        background: #f3eadb;
        color: var(--ink);
        text-align: center;
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      }

      .node strong {
        display: block;
        font-size: 17px;
        line-height: 1.1;
      }

      .node small {
        display: block;
        margin-top: 5px;
        color: var(--muted-dark);
        font-family: monospace;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .node-a {
        top: 78px;
      }

      .node-b {
        top: 172px;
      }

      .node-c {
        top: 266px;
      }

      .artifact {
        align-self: center;
        background: var(--paper);
        color: var(--ink);
        padding: 20px;
      }

      .artifact .label {
        color: var(--muted-dark);
      }

      .artifact h1 {
        margin: 12px 0 0;
        font-family: serif;
        font-size: 32px;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .quote {
        margin: 16px 0 0;
        border-left: 3px solid var(--accent);
        padding-left: 12px;
        color: #2b2923;
        font-size: 15px;
        line-height: 1.55;
      }

      .source-map {
        margin-top: 18px;
        border: 1px solid var(--line-dark);
        background: var(--paper-strong);
      }

      .source-row {
        display: grid;
        grid-template-columns: 12px 1fr;
        gap: 10px;
        align-items: center;
        border-top: 1px solid var(--line-dark);
        padding: 10px 12px;
        color: #2b2923;
        font-size: 13px;
      }

      .source-row:first-child {
        border-top: 0;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        animation: dot-pulse 4.8s ease-in-out infinite;
      }

      .scan {
        animation: hermes-scan 4.8s linear infinite;
      }

      .node {
        animation: node-pulse 4.8s ease-in-out infinite;
      }

      .node-b {
        animation-delay: 0.4s;
      }

      .node-c {
        animation-delay: 0.8s;
      }

      .doc {
        animation: card-breathe 4.8s ease-in-out infinite;
      }

      .doc-2 {
        animation-delay: 0.35s;
      }

      .doc-3 {
        animation-delay: 0.7s;
      }

      @keyframes hermes-scan {
        0% {
          transform: translateY(0);
          opacity: 0;
        }
        12%,
        82% {
          opacity: 1;
        }
        52% {
          transform: translateY(164px);
          opacity: 1;
        }
        100% {
          transform: translateY(0);
          opacity: 0;
        }
      }

      @keyframes node-pulse {
        0%,
        100% {
          border-color: rgba(243, 234, 219, 0.22);
          box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
        }
        46%,
        58% {
          border-color: rgba(197, 138, 44, 0.78);
          box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28), 0 0 18px rgba(197, 138, 44, 0.36);
        }
      }

      @keyframes dot-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(197, 138, 44, 0);
        }
        52% {
          box-shadow: 0 0 0 5px rgba(197, 138, 44, 0.22);
        }
      }

      @keyframes card-breathe {
        0%,
        100% {
          border-color: var(--line-dark);
        }
        45%,
        55% {
          border-color: rgba(197, 138, 44, 0.48);
        }
      }

      @media (max-width: 720px) {
        .topline {
          left: 18px;
          right: 18px;
          top: 14px;
          font-size: 10px;
        }

        .topline span:last-child {
          display: none;
        }

        .scene {
          grid-template-columns: 1fr;
          gap: 10px;
          padding: 52px 18px 18px;
        }

        .sources {
          display: none;
        }

        .pipeline {
          min-height: 176px;
        }

        .pipeline-title {
          display: none;
        }

        .rail {
          left: 28px;
          right: 28px;
          top: 50%;
          bottom: auto;
          width: auto;
          height: 2px;
        }

        .scan {
          left: 28px;
          top: calc(50% - 3px);
          width: 80px;
          height: 6px;
          background: linear-gradient(90deg, transparent, var(--accent), transparent);
          animation-name: hermes-scan-mobile;
        }

        .node {
          top: calc(50% - 32px);
          left: auto;
          width: 92px;
          min-height: 58px;
          transform: none;
        }

        .node-a {
          left: 28px;
        }

        .node-b {
          left: calc(50% - 46px);
        }

        .node-c {
          right: 28px;
        }

        .node strong {
          font-size: 14px;
        }

        .node small {
          font-size: 9px;
        }

        .artifact {
          padding: 16px;
        }

        .artifact h1 {
          font-size: 24px;
        }

        .quote,
        .source-row {
          font-size: 12px;
        }
      }

      @keyframes hermes-scan-mobile {
        0% {
          transform: translateX(0);
          opacity: 0;
        }
        12%,
        82% {
          opacity: 1;
        }
        52% {
          transform: translateX(190px);
          opacity: 1;
        }
        100% {
          transform: translateX(0);
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="hermes-film-loop"
      data-composition-id="hermes-film-loop"
      data-start="0"
      data-duration="8"
      data-width="960"
      data-height="540"
      data-track-index="0"
    >
      <div class="grid" data-layout-ignore></div>
      <div class="topline">
        <span>Hermes Notebook / 知识系统</span>
        <span>资料 -> 引用回答 -> 知识卡片</span>
      </div>
      <main class="scene">
        <section class="sources panel">
          <p class="label">Public inputs</p>
          <div class="doc doc-1">
            <strong>PDF 文档</strong>
            <small>制度、研究、项目资料</small>
            <span class="bar"></span>
          </div>
          <div class="doc doc-2">
            <strong>网页记录</strong>
            <small>公开页面与长文</small>
            <span class="bar"></span>
          </div>
          <div class="doc doc-3">
            <strong>会议字幕</strong>
            <small>讨论、课程、访谈</small>
            <span class="bar"></span>
          </div>
        </section>

        <section class="pipeline">
          <p class="label pipeline-title">System handoff</p>
          <div class="rail" data-layout-ignore></div>
          <div class="scan" data-layout-ignore></div>
          <div class="node node-a"><span><strong>导入</strong><small>ingest</small></span></div>
          <div class="node node-b"><span><strong>整理</strong><small>chunk</small></span></div>
          <div class="node node-c"><span><strong>引用</strong><small>cite</small></span></div>
        </section>

        <section class="artifact">
          <p class="label">Client artifact</p>
          <h1>可追溯知识卡片</h1>
          <p class="quote">回答不是孤立文本，每个结论都保留来源、段落和复核线索。</p>
          <div class="source-map">
            <div class="source-row"><span class="dot"></span><span>来源 01 / PDF 第 12 页</span></div>
            <div class="source-row"><span class="dot"></span><span>来源 02 / 会议 14:32</span></div>
            <div class="source-row"><span class="dot"></span><span>来源 03 / 字幕片段 08</span></div>
          </div>
        </section>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      if (window.gsap) {
        const tl = gsap.timeline({ paused: true });
        tl.to({}, { duration: 8 });
        window.__timelines["hermes-film-loop"] = tl;
      }
    </script>
  </body>
</html>
