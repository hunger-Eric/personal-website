<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lead Discovery Film Loop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10110e;
        --panel: #171813;
        --paper: #f3eadb;
        --paper-strong: #fff8eb;
        --ink: #1f2420;
        --muted: #d8cbb6;
        --muted-dark: #6f624f;
        --line: rgba(243, 234, 219, 0.16);
        --line-dark: rgba(31, 36, 32, 0.14);
        --accent: #c58a2c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family: sans-serif;
      }

      #freight-film-loop {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 72% 18%, rgba(197, 138, 44, 0.22), transparent 32%),
          linear-gradient(145deg, rgba(255, 248, 235, 0.08), transparent 44%),
          #10110e;
        color: var(--paper);
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 42px 42px;
        opacity: 0.45;
      }

      .topline {
        position: absolute;
        z-index: 3;
        top: 28px;
        left: 42px;
        right: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 12px;
        color: var(--muted);
        font-family: monospace;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .scene {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 315px;
        gap: 20px;
        width: 100%;
        height: 100%;
        padding: 72px 42px 36px;
      }

      .map,
      .lead-table {
        border: 1px solid var(--line);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }

      .map {
        position: relative;
        align-self: stretch;
        background: rgba(23, 24, 19, 0.78);
        overflow: hidden;
      }

      .axis {
        position: absolute;
        background: rgba(243, 234, 219, 0.13);
      }

      .axis-x {
        left: 42px;
        right: 42px;
        top: 50%;
        height: 1px;
      }

      .axis-y {
        left: 50%;
        top: 42px;
        bottom: 42px;
        width: 1px;
      }

      .node {
        position: absolute;
        width: 118px;
        border: 1px solid var(--line-dark);
        background: var(--paper);
        color: var(--ink);
        padding: 10px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
      }

      .node strong {
        display: block;
        font-size: 15px;
        line-height: 1.12;
      }

      .node small {
        display: block;
        margin-top: 5px;
        color: var(--muted-dark);
        font-family: monospace;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .n1 {
        left: 48px;
        top: 66px;
      }

      .n2 {
        left: 230px;
        top: 116px;
      }

      .n3 {
        right: 70px;
        top: 78px;
      }

      .n4 {
        left: 136px;
        bottom: 70px;
      }

      .n5 {
        right: 92px;
        bottom: 84px;
      }

      .link {
        position: absolute;
        height: 2px;
        transform-origin: left center;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        filter: drop-shadow(0 0 12px rgba(197, 138, 44, 0.58));
      }

      .l1 {
        left: 160px;
        top: 124px;
        width: 184px;
        transform: rotate(16deg);
      }

      .l2 {
        left: 330px;
        top: 150px;
        width: 190px;
        transform: rotate(-12deg);
      }

      .l3 {
        left: 230px;
        bottom: 132px;
        width: 245px;
        transform: rotate(-8deg);
      }

      .lead-table {
        align-self: stretch;
        background: var(--paper);
        color: var(--ink);
        padding: 20px;
      }

      .label {
        margin: 0;
        color: var(--muted-dark);
        font-family: monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .lead-table h1 {
        margin: 12px 0 16px;
        font-family: serif;
        font-size: 31px;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .row {
        display: grid;
        grid-template-columns: 34px 1fr 48px;
        align-items: center;
        gap: 10px;
        border-top: 1px solid var(--line-dark);
        padding: 11px 0;
        color: #2b2923;
        font-size: 13px;
        line-height: 1.35;
      }

      .grade {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        background: var(--accent);
        color: #15100a;
        font-family: monospace;
        font-weight: 800;
      }

      .score {
        color: #2b2923;
        font-family: monospace;
        font-size: 12px;
        text-align: right;
      }

      .evidence {
        margin-top: 18px;
        border: 1px solid var(--line-dark);
        background: var(--paper-strong);
        padding: 12px;
        color: #2b2923;
        font-size: 13px;
        line-height: 1.55;
      }

      .link {
        animation: link-sweep 5.2s ease-in-out infinite;
      }

      .l2 {
        animation-delay: 0.35s;
      }

      .l3 {
        animation-delay: 0.7s;
      }

      .node {
        animation: card-breathe 5.2s ease-in-out infinite;
      }

      .n2 {
        animation-delay: 0.25s;
      }

      .n3 {
        animation-delay: 0.5s;
      }

      .n4 {
        animation-delay: 0.75s;
      }

      .n5 {
        animation: score-pulse 5.2s ease-in-out infinite;
        animation-delay: 1s;
      }

      .grade {
        animation: grade-pulse 5.2s ease-in-out infinite;
      }

      @keyframes link-sweep {
        0%,
        100% {
          opacity: 0.24;
          filter: drop-shadow(0 0 8px rgba(197, 138, 44, 0.25));
        }
        48%,
        60% {
          opacity: 1;
          filter: drop-shadow(0 0 16px rgba(197, 138, 44, 0.7));
        }
      }

      @keyframes score-pulse {
        0%,
        100% {
          border-color: var(--line-dark);
          box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
        }
        52% {
          border-color: rgba(197, 138, 44, 0.72);
          box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25), 0 0 18px rgba(197, 138, 44, 0.36);
        }
      }

      @keyframes grade-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(197, 138, 44, 0);
        }
        52% {
          box-shadow: 0 0 0 5px rgba(197, 138, 44, 0.2);
        }
      }

      @keyframes card-breathe {
        0%,
        100% {
          border-color: var(--line-dark);
        }
        48%,
        58% {
          border-color: rgba(197, 138, 44, 0.48);
        }
      }

      @media (max-width: 720px) {
        .topline {
          left: 18px;
          right: 18px;
          top: 14px;
          font-size: 10px;
        }

        .topline span:last-child {
          display: none;
        }

        .scene {
          grid-template-columns: 1fr;
          gap: 10px;
          padding: 52px 18px 18px;
        }

        .map {
          min-height: 178px;
        }

        .node {
          width: 90px;
          padding: 8px;
        }

        .node strong {
          font-size: 13px;
        }

        .node small {
          font-size: 9px;
        }

        .n1 {
          left: 22px;
          top: 26px;
        }

        .n2 {
          left: calc(50% - 45px);
          top: 70px;
        }

        .n3 {
          right: 22px;
          top: 26px;
        }

        .n4,
        .n5 {
          display: none;
        }

        .lead-table {
          padding: 16px;
        }

        .lead-table h1 {
          font-size: 24px;
        }

        .row,
        .evidence {
          font-size: 12px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="freight-film-loop"
      data-composition-id="freight-film-loop"
      data-start="0"
      data-duration="8"
      data-width="960"
      data-height="540"
      data-track-index="0"
    >
      <div class="grid" data-layout-ignore></div>
      <div class="topline">
        <span>Lead Discovery / 线索发现</span>
        <span>公开来源 -> 证据链 -> 优先级</span>
      </div>
      <main class="scene">
        <section class="map">
          <div class="axis axis-x" data-layout-ignore></div>
          <div class="axis axis-y" data-layout-ignore></div>
          <div class="link l1" data-layout-ignore></div>
          <div class="link l2" data-layout-ignore></div>
          <div class="link l3" data-layout-ignore></div>
          <div class="node n1"><strong>公开来源</strong><small>source</small></div>
          <div class="node n2"><strong>官网分析</strong><small>site</small></div>
          <div class="node n3"><strong>联系证据</strong><small>evidence</small></div>
          <div class="node n4"><strong>画像匹配</strong><small>profile</small></div>
          <div class="node n5"><strong>优先级</strong><small>score</small></div>
        </section>

        <section class="lead-table">
          <p class="label">Client artifact</p>
          <h1>可审计线索批次</h1>
          <div class="row">
            <span class="grade">A</span>
            <span>画像匹配，证据完整</span>
            <span class="score">92</span>
          </div>
          <div class="row">
            <span class="grade">B</span>
            <span>官网已解析，可触达</span>
            <span class="score">81</span>
          </div>
          <div class="row">
            <span class="grade">C</span>
            <span>需要人工复核</span>
            <span class="score">64</span>
          </div>
          <div class="evidence">证据链：公开页面、联系入口、关键词命中、下一步动作。</div>
        </section>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      if (window.gsap) {
        const tl = gsap.timeline({ paused: true });
        tl.to({}, { duration: 8 });
        window.__timelines["freight-film-loop"] = tl;
      }
    </script>
  </body>
</html>
